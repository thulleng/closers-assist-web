<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="dGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f6fff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f6fff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- DC Monogram circle -->
  <circle cx="40" cy="40" r="38" fill="url(#ring)"/>
  <circle cx="40" cy="40" r="34" fill="#0a0a0a"/>
  <text x="25" y="50" font-family="Arial Black, Impact, sans-serif" 
        font-size="40" font-weight="900" text-anchor="middle" fill="url(#dGrad)">D</text>
  <text x="54" y="50" font-family="Arial Black, Impact, sans-serif" 
        font-size="40" font-weight="900" text-anchor="middle" fill="url(#cGrad)">C</text>
  
  <!-- DEAL CLOZR text -->
  <text x="95" y="37" font-family="Arial, Helvetica, sans-serif"
        font-size="18" font-weight="800" fill="url(#dGrad)" letter-spacing="3">DEAL</text>
  <text x="95" y="60" font-family="Arial, Helvetica, sans-serif"
        font-size="18" font-weight="800" fill="url(#cGrad)" letter-spacing="3">CLOZR</text>
</svg>
