<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="dBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Dark circle background -->
  <circle cx="256" cy="256" r="245" fill="#0A0A0F"/>

  <!-- 
    D - Bold capital D 
    Thick vertical spine on the left, thin curved bowl on the right
  -->
  <!-- D spine: thick vertical line -->
  <path d="M 155 145 L 150 370" stroke="url(#dBlue)" stroke-width="40" stroke-linecap="round" fill="none"/>
  
  <!-- D bowl: thin arc from top of spine to bottom -->
  <path d="M 165 155 C 290 155, 340 205, 340 262 C 340 320, 290 370, 160 370" 
        stroke="url(#dBlue)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- 
    C - Diagonal C stroke crossing through D 
    Starts upper-left of D's bowl, crosses diagonally to lower-right
  -->
  <path d="M 155 125 C 230 160, 360 200, 390 265 C 360 320, 280 380, 215 415" 
        stroke="url(#cPurple)" stroke-width="14" stroke-linecap="round" fill="none"/>
</svg>
