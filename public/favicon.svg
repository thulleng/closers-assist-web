<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="dGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <!-- Dark circle background -->
  <circle cx="256" cy="256" r="240" fill="#0C0C14"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1F1F30" stroke-width="4"/>

  <!-- 
    Hand-drawn DC monogram
    D: left, thick bold marker style
    C: right, connected to D via a knot/loop in the center
  -->

  <!-- D: Left vertical spine — thick, bold -->
  <path d="M 155 145 L 148 365" stroke="url(#dGrad)" stroke-width="46" stroke-linecap="round" fill="none"/>
  
  <!-- D: Curved bowl — arcs right from top to bottom -->
  <path d="M 170 155 
           C 290 155, 360 200, 360 260 
           C 360 320, 290 358, 160 358" 
        stroke="url(#dGrad)" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- D: Small tail at bottom-left -->
  <path d="M 148 365 L 115 372" stroke="url(#dGrad)" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- C: Open curve on the right, connected to D at center -->
  <!-- C top arm: from upper-right, curves down to meet D bowl -->
  <path d="M 430 180 
           C 430 180, 390 220, 362 245" 
        stroke="url(#cGrad)" stroke-width="16" stroke-linecap="round" fill="none"/>
  
  <!-- C bottom arm: from lower-right, curves up to meet D bowl -->
  <path d="M 435 350 
           C 435 350, 390 310, 362 275" 
        stroke="url(#cGrad)" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- Connecting knot: the loop where D and C tie together -->
  <path d="M 362 245 
           C 378 255, 378 268, 362 275
           C 348 282, 348 252, 362 245" 
        stroke="url(#cGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
</svg>
