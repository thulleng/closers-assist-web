<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="dGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f6fff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f6fff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="15.5" fill="url(#ring)"/>
  <!-- Inner circle -->
  <circle cx="16" cy="16" r="14" fill="#0a0a0a"/>
  
  <!-- DC -->
  <text x="8" y="22" font-family="Arial Black, Impact, sans-serif" 
        font-size="18" font-weight="900" text-anchor="middle" fill="url(#dGrad)">D</text>
  <text x="23" y="22" font-family="Arial Black, Impact, sans-serif" 
        font-size="18" font-weight="900" text-anchor="middle" fill="url(#cGrad)">C</text>
</svg>
