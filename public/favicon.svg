<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="dGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Dark circle background -->
  <circle cx="256" cy="256" r="240" fill="#0C0C14"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1A1A2E" stroke-width="3"/>

  <!-- D - Bold vertical spine (left side, thick) -->
  <path d="M 130 142 L 130 370" 
        stroke="url(#dGrad)" stroke-width="38" stroke-linecap="round" fill="none"/>
  
  <!-- D - Thin curved bowl (right side, thin single stroke) -->
  <path d="M 155 155
           C 240 155, 285 195, 285 256
           C 285 317, 240 357, 155 357" 
        stroke="url(#dGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- C - Diagonal thin stroke crossing through D's bowl -->
  <path d="M 195 138
           C 245 165, 335 200, 360 256
           C 340 305, 280 350, 235 386" 
        stroke="url(#cGrad)" stroke-width="14" stroke-linecap="round" fill="none" filter="url(#glow)"/>
</svg>
