<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="barFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- The ring — dark, closed at bottom, gap at TOP -->
  <!-- Starts at top-left (10 o'clock, x=100,y=130), arcs clockwise to top-right (2 o'clock, x=412,y=130) -->
  <path d="M 100 130 
           A 208 208 0 1 0 412 130" 
        stroke="#1a1a2e" stroke-width="44" fill="none" stroke-linecap="round"/>

  <!-- The closer bar — thick pill, bridging the top gap between the two open ends -->
  <g filter="url(#shadow)">
    <rect x="125" y="108" width="262" height="44" rx="22" fill="url(#barFill)"/>
  </g>
</svg>
