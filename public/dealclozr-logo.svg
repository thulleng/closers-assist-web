<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f6fff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="url(#brand)"/>
  
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="225" fill="#0a0a0a"/>
  
  <!-- The mark: A bold stylized "DC" monogram -->
  
  <!-- D - vertical stroke -->
  <rect x="175" y="160" width="32" height="192" rx="10" fill="url(#brand)"/>
  
  <!-- D - curved body -->
  <path d="M 207 160 
           C 280 160, 320 200, 320 256 
           C 320 312, 280 352, 207 352" 
        stroke="url(#brand)" stroke-width="28" fill="none" stroke-linecap="round"/>
  
  <!-- C - outer curve -->
  <path d="M 360 190 
           C 420 220, 420 292, 360 322" 
        stroke="url(#brand)" stroke-width="28" fill="none" stroke-linecap="round"/>
  
  <!-- Small gap between D and C showing they're separate -->
  <!-- Clean. Bold. Monogram. -->
</svg>
